name: build-and-publish

on:
  push:
    branches: [main, develop]
    tags: ['v*']
  pull_request:
    branches: [main, develop]

jobs:
  validate:
    name: Validate references and build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Check for path-form references that should be tokens
        run: python3 bin/sync-skill-references.py --check

      - name: Validate token resolution (build --check)
        run: python3 bin/build.py --check

      - name: Full build for hook validation
        run: python3 bin/build.py

      - name: Validate hook installation (claude-code)
        run: python3 bin/validate-hooks.py dist/claude-code/

      - name: Validate hook installation (craft-agent)
        run: python3 bin/validate-hooks.py dist/craft-agent/

      - name: Validate repo hooks match snippet
        run: python3 bin/validate-hooks.py

  publish:
    name: Build and publish to release branches
    needs: validate
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop' || startsWith(github.ref, 'refs/tags/v'))
    runs-on: ubuntu-latest
    # Serialize publish runs so back-to-back triggers (e.g. a `git push origin main`
    # immediately followed by `git push origin vX.Y.Z`) queue instead of racing.
    # Both runs need to push to release/nested + release/flat; concurrent --force
    # pushes lose the race with `cannot lock ref ... is at X but expected Y`.
    concurrency:
      group: publish-release-branches
      cancel-in-progress: false
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # need history for branch operations

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Resolve release version
        id: resolve-version
        if: github.ref == 'refs/heads/main' && github.actor != 'github-actions[bot]'
        run: |
          VERSION=$(cat VERSION | tr -d '[:space:]')
          MAJOR=$(echo "$VERSION" | cut -d. -f1)
          MINOR=$(echo "$VERSION" | cut -d. -f2)
          PATCH=$(echo "$VERSION" | cut -d. -f3)
          while git rev-parse "v${MAJOR}.${MINOR}.${PATCH}" >/dev/null 2>&1; do
            PATCH=$((PATCH + 1))
          done
          RESOLVED="${MAJOR}.${MINOR}.${PATCH}"
          if [ "$RESOLVED" != "$VERSION" ]; then
            echo "$RESOLVED" > VERSION
          fi
          echo "version=$RESOLVED" >> "$GITHUB_OUTPUT"
          echo "tag=v${RESOLVED}" >> "$GITHUB_OUTPUT"
          echo "bumped=$( [ "$RESOLVED" != "$VERSION" ] && echo true || echo false )" >> "$GITHUB_OUTPUT"

      - name: Build dist/nested and dist/flat
        run: python3 bin/build.py

      - name: Publish dist/nested → release/nested branch
        run: |
          # Worktree from a fresh orphan branch; force-overwrite the remote.
          # Don't pre-fetch the remote branch — that would create a local ref
          # that conflicts with `worktree add -B`.
          rm -rf /tmp/release-nested
          git branch -D release/nested 2>/dev/null || true
          git worktree add --orphan -B release/nested /tmp/release-nested
          rsync -a --delete --exclude='.git' dist/nested/ /tmp/release-nested/
          cp -f README.md LICENSE CHANGELOG.md /tmp/release-nested/ 2>/dev/null || true
          cp -f THIRD_PARTY_NOTICES.md CONTRIBUTING.md /tmp/release-nested/ 2>/dev/null || true
          (cd /tmp/release-nested && git add -A && git commit -m "Publish nested layout from ${GITHUB_SHA::7}" 2>/dev/null || echo "no changes")
          (cd /tmp/release-nested && git push origin release/nested --force)

      - name: Publish dist/flat → release/flat branch
        run: |
          rm -rf /tmp/release-flat
          git branch -D release/flat 2>/dev/null || true
          git worktree add --orphan -B release/flat /tmp/release-flat
          rsync -a --delete --exclude='.git' dist/flat/ /tmp/release-flat/
          cp -f README.md LICENSE CHANGELOG.md /tmp/release-flat/ 2>/dev/null || true
          cp -f THIRD_PARTY_NOTICES.md CONTRIBUTING.md /tmp/release-flat/ 2>/dev/null || true
          (cd /tmp/release-flat && git add -A && git commit -m "Publish flat layout from ${GITHUB_SHA::7}" 2>/dev/null || echo "no changes")
          (cd /tmp/release-flat && git push origin release/flat --force)

      - name: Publish dist/claude-code → release/claude-code branch
        run: |
          rm -rf /tmp/release-claude-code
          git branch -D release/claude-code 2>/dev/null || true
          git worktree add --orphan -B release/claude-code /tmp/release-claude-code
          rsync -a --delete --exclude='.git' dist/claude-code/ /tmp/release-claude-code/
          (cd /tmp/release-claude-code && git add -A && git commit -m "Publish claude-code package from ${GITHUB_SHA::7}" 2>/dev/null || echo "no changes")
          (cd /tmp/release-claude-code && git push origin release/claude-code --force)

      - name: Publish dist/craft-agent → release/craft-agent branch
        run: |
          rm -rf /tmp/release-craft-agent
          git branch -D release/craft-agent 2>/dev/null || true
          git worktree add --orphan -B release/craft-agent /tmp/release-craft-agent
          rsync -a --delete --exclude='.git' dist/craft-agent/ /tmp/release-craft-agent/
          (cd /tmp/release-craft-agent && git add -A && git commit -m "Publish craft-agent package from ${GITHUB_SHA::7}" 2>/dev/null || echo "no changes")
          (cd /tmp/release-craft-agent && git push origin release/craft-agent --force)

      - name: Tag resolved version
        id: auto-tag
        if: github.ref == 'refs/heads/main' && github.actor != 'github-actions[bot]'
        run: |
          # The resolve-version step walks past existing tags to pick the next
          # free version and already wrote it to the working-tree VERSION, so the
          # build embedded it. The tag is the release identity. We do NOT commit
          # VERSION back to main: main is a protected branch and CI cannot push to
          # it (GH006 "Changes must be made through a pull request"), which failed
          # every release run since this step was introduced. VERSION-in-repo is a
          # floor only -- bump it via a normal PR for minor/major changes; patch
          # auto-increment is driven entirely by the tag walk above.
          TAG="${{ steps.resolve-version.outputs.tag }}"
          git tag "$TAG"
          git push origin "$TAG"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Tag release branches
        if: startsWith(github.ref, 'refs/tags/v') || steps.auto-tag.outputs.tag != ''
        run: |
          if [ -n "${{ steps.auto-tag.outputs.tag }}" ]; then
            TAG="${{ steps.auto-tag.outputs.tag }}"
          else
            TAG=${GITHUB_REF#refs/tags/}
          fi
          NESTED_SHA=$(git -C /tmp/release-nested rev-parse HEAD)
          FLAT_SHA=$(git -C /tmp/release-flat rev-parse HEAD)
          CC_SHA=$(git -C /tmp/release-claude-code rev-parse HEAD)
          CA_SHA=$(git -C /tmp/release-craft-agent rev-parse HEAD)
          git tag "${TAG}-nested" "$NESTED_SHA"
          git tag "${TAG}-flat" "$FLAT_SHA"
          git tag "${TAG}-claude-code" "$CC_SHA"
          git tag "${TAG}-craft-agent" "$CA_SHA"
          git push origin "${TAG}-nested" "${TAG}-flat" "${TAG}-claude-code" "${TAG}-craft-agent"

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v') || steps.auto-tag.outputs.tag != ''
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ -n "${{ steps.auto-tag.outputs.tag }}" ]; then
            TAG="${{ steps.auto-tag.outputs.tag }}"
          else
            TAG=${GITHUB_REF#refs/tags/}
          fi
          tar -czf "claude-code-${TAG}.tar.gz" -C dist/claude-code .
          tar -czf "craft-agent-${TAG}.tar.gz" -C dist/craft-agent .
          gh release create "$TAG" \
            --title "$TAG" \
            --notes "Release ${TAG}. Consumer packages: \`${TAG}-claude-code\` and \`${TAG}-craft-agent\`. Layout tags: \`${TAG}-nested\` and \`${TAG}-flat\`." \
            --latest \
            "claude-code-${TAG}.tar.gz#Claude Code hooks package" \
            "craft-agent-${TAG}.tar.gz#Craft Agent hooks package"
